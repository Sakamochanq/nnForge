name: Python CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Test using device in main.py
      run: |
        mkdir -p src/assets
        echo "class config:" > src/assets/config.py
        echo "    dataset = 'dummy'" >> src/assets/config.py
        echo "    img_size = 224" >> src/assets/config.py
        echo "    batch_size = 32" >> src/assets/config.py
        echo "    epochs = 1" >> src/assets/config.py
        echo "    learning_rate = 0.001" >> src/assets/config.py
        echo "    model = 'Model.pth'" >> src/assets/config.py

        cd src

        python -c "
        from assets.dataset import DataManager
        from assets.model import Model
        from assets.train import Train
        print('--- Actions Test: Checking Device ---')
        "
